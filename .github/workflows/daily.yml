name: Daily Fuel Price Agent

on:
  schedule:
    - cron: '59 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fuel agent
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fuel_agent.py

      - name: Save price history
        run: |
          git config user.name "fuel-bot"
          git config user.email "bot@github.com"
          git add price_history.csv
          git diff --staged --quiet || git commit -m "Update price history $(date +%Y-%m-%d)"
          git push
